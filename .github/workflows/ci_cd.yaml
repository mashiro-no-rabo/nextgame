name: Build and deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy master
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v5
      with:
        version: 10
    - name: Restore cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
          /usr/share/rust/.rustup/
          ~/.local/share/pnpm/store/
          engine/target/
        key: ${{ runner.os }}-${{ hashFiles('api/Cargo.lock') }}-${{ hashFiles('api/pnpm-lock.yaml', 'web/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: "wasm32-unknown-unknown"
    - run: cd api && pnpm install
    - run: cd web && pnpm install
    - uses: taiki-e/install-action@v2
      with:
        tool: just
    - run: cargo install -q worker-build
    - name: Build API
      run: cd api && just build
    - name: Build Web
      run: cd web && just build
    - name: Deploy
      if: ${{ github.ref_type == 'branch' && github.ref_name == 'master' }}
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
      run: |
        (cd api && just deploy)
        (cd web && just deploy)
    - name: Save cache
      if: always()
      uses: actions/cache/save@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
          /usr/share/rust/.rustup/
          ~/.local/share/pnpm/store/
          engine/target/
        key: ${{ runner.os }}-${{ hashFiles('api/Cargo.lock') }}-${{ hashFiles('api/pnpm-lock.yaml', 'web/pnpm-lock.yaml') }}
